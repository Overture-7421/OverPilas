<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Seleccionar Modo de Competencia</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #4B0082;
            margin-bottom: 10px;
        }
        p {
            color: #6B7280;
            margin-bottom: 30px;
        }
        .mode-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }
        .mode-btn {
            flex: 1;
            padding: 30px 20px;
            border: 3px solid transparent;
            border-radius: 15px;
            background: linear-gradient(135deg, #E6E0F8, #F3F0FF);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 18px;
            font-weight: bold;
            color: #4B0082;
        }
        .mode-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(107, 70, 193, 0.3);
            border-color: #9370DB;
        }
        .mode-btn .title {
            font-size: 32px;
            margin-bottom: 10px;
        }
        .mode-btn .description {
            font-size: 14px;
            color: #6B7280;
            font-weight: normal;
        }
        form {
            display: inline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔋 Bienvenido al Sistema de Pilas 🔋</h1>
        <p>Por favor selecciona el modo de competencia para comenzar</p>

        <div class="mode-buttons">
            <form action="/set_mode" method="post">
                <input type="hidden" name="mode" value="FRC">
                <button type="submit" class="mode-btn">
                    <div class="title">FRC</div>
                    <div class="description">
                        FIRST Robotics Competition<br>
                        Cooldown: 30 minutos<br>
                        Requiere: Carga y Ohms
                    </div>
                </button>
            </form>

            <form action="/set_mode" method="post">
                <input type="hidden" name="mode" value="FTC">
                <button type="submit" class="mode-btn">
                    <div class="title">FTC</div>
                    <div class="description">
                        FIRST Tech Challenge<br>
                        Cooldown: 15 minutos<br>
                        Solo nombre de batería
                    </div>
                </button>
            </form>
        </div>
    </div>
</body>
</html>
